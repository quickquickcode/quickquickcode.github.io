<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="keywords" content="quickquickcode,个人主页">
  <meta name="description" content="quickquickcode 的个人主页，分享学习与生活">
  <meta name="author" content="quickquickcode">
  <title>quickquickcode | 个人主页</title>

          <span>GitHub</span>
        </a>
        <a href="https://quickquickcode.github.io/blog/" target="_blank" class="social-btn blog" title="博客">
          <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6zm2 2h8v2H8V8zm0 4h8v2H8v-2zm0 4h5v2H8v-2z"/></svg>
          <span>博客</span>
        </a>
        <a href="mailto:quickquickcode@example.com" class="social-btn email" title="邮箱">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

        </a>
      </div>

    <!-- 右侧：作品导航 -->
    <section class="card works-card">
      <h2 class="section-title">作品导航</h2>
      <div class="works-grid">
        <a href="https://quickquickcode.github.io/blog/" target="_blank" class="work-item">
          <div class="work-icon">📝</div>
          <div class="work-info">
            <h3>技术博客</h3>
            <p>记录学习心得与技术分享</p>
          </div>
        </a>
        <a href="https://github.com/quickquickcode" target="_blank" class="work-item">
          <div class="work-icon">💻</div>
          <div class="work-info">
            <h3>开源项目</h3>
            <p>GitHub 上的代码仓库</p>
          </div>
        </a>
        <a href="#" class="work-item coming-soon">
          <div class="work-icon">🚀</div>
          <div class="work-info">
            <h3>敬请期待</h3>
            <p>更多作品正在路上</p>

          <div class="work-icon">✨</div>
          <div class="work-info">
